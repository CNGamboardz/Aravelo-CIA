<!DOCTYPE html>
<html lang="es">
<head>
  <script>
    // Redirección automática si ya hay sesión activa
    (function(){
      const token = localStorage.getItem('secure_portal_token');
      const ses = localStorage.getItem('portal_cliente');
      if (token || ses) {
        document.documentElement.innerHTML = '';
        window.location.replace('/portal-cliente.html');
      }
    })();
  </script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal de Clientes — Arévalo & CIA</title>
  <meta name="description" content="Accede a tu portal personal de clientes Arévalo & CIA. Consulta lotes, agenda citas y realiza pagos.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <!-- ESCUDO DE SEGURIDAD GLOBAL ANTI-CRACKERS Y ENCRIPTACIÓN -->
  <script src="/public/security-bundle.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      overflow-x: hidden;
      overflow-y: auto;
      color: #0f172a;
    }

    /* Decoraciones de fondo claras y estéticas */
    body::before {
      content: '';
      position: absolute;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(37, 99, 235, 0.05) 0%, transparent 70%);
      top: -100px; left: -100px;
      animation: floatOrb 8s ease-in-out infinite;
    }
    body::after {
      content: '';
      position: absolute;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(29, 78, 216, 0.04) 0%, transparent 70%);
      bottom: -100px; right: -100px;
      animation: floatOrb 10s ease-in-out infinite reverse;
    }

    @keyframes floatOrb {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(30px, 30px); }
    }

    .login-container {
      width: 100%;
      max-width: 520px;
      position: relative;
      z-index: 1;
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .brand-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .brand-logo {
      width: 72px; height: 72px;
      border-radius: 20px;
      background: #ffffff;
      border: 1px solid #bfdbfe;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      box-shadow: 0 10px 25px rgba(37, 99, 235, 0.1);
    }

    .brand-logo img {
      width: 52px; height: 52px;
      object-fit: contain;
    }

    .brand-header h1 {
      font-size: 24px;
      font-weight: 800;
      color: #0f172a;
      letter-spacing: -0.5px;
    }

    .brand-header p {
      font-size: 14px;
      color: #64748b;
      margin-top: 4px;
      font-weight: 500;
    }

    .card {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 24px;
      padding: 36px;
      box-shadow: 0 20px 40px rgba(100, 116, 133, 0.08);
    }

    .tab-switch {
      display: flex;
      background: #f8fafc;
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 28px;
      border: 1px solid #e2e8f0;
    }

    .tab-btn {
      flex: 1;
      padding: 10px;
      border: none;
      background: transparent;
      color: #64748b;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 700;
      border-radius: 9px;
      cursor: pointer;
      transition: 0.3s;
    }

    .tab-btn.active {
      background: #ffffff;
      color: #2563eb;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }

    .form-section { display: none; }
    .form-section.active { display: block; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* Contenedor con scroll interno claro y hermoso */
    #secRegistro {
      max-height: 400px;
      overflow-y: auto;
      padding-right: 12px;
    }

    #secRegistro::-webkit-scrollbar { width: 6px; }
    #secRegistro::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 10px; }
    #secRegistro::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    #secRegistro::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

    .form-group {
      margin-bottom: 14px;
    }

    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: #475569;
      margin-bottom: 6px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .form-group input, .form-group select {
      width: 100%;
      padding: 11px 14px;
      background: #f8fafc;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      color: #0f172a;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      outline: none;
      transition: 0.2s;
    }

    .form-group input::placeholder { color: #94a3b8; }

    .form-group input:focus, .form-group select:focus {
      border-color: #2563eb;
      background: #ffffff;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    .form-grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .btn-primary {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
      border: none;
      border-radius: 14px;
      color: #ffffff;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(37, 99, 235, 0.2);
      transition: 0.3s;
      margin-top: 8px;
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 12px 25px rgba(37, 99, 235, 0.3);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .msg-box {
      display: none;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .msg-error {
      background: #fef2f2;
      border: 1px solid #fca5a5;
      color: #dc2626;
    }

    .msg-success {
      background: #ecfdf5;
      border: 1px solid #a7f3d0;
      color: #059669;
    }

    .footer-link {
      text-align: center;
      margin-top: 24px;
    }

    .footer-link a {
      color: #94a3b8;
      font-size: 12px;
      text-decoration: none;
      transition: 0.2s;
      font-weight: 600;
    }

    .footer-link a:hover { color: #2563eb; }

    /* Estilos para el campo de contraseña con ojito */
    .password-box {
      position: relative;
    }
    .password-box input {
      padding-right: 40px;
    }
    .eye {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      opacity: 0.5;
      transition: 0.2s;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .eye:hover { opacity: 1; }
    .eye img { width: 18px; height: 18px; }

    /* Tooltip de error para el correo */
    .input-error {
      border-color: #ef4444 !important;
      background: #fef2f2 !important;
    }
    .tooltip-error {
      font-size: 11px;
      color: #ef4444;
      margin-top: 4px;
      display: none;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="brand-header">
      <div class="brand-logo">
        <img src="/public/img/LogoApp.png" alt="Logo Arévalo" onerror="this.src='https://placehold.co/52/2563eb/ffffff?text=A'">
      </div>
      <h1>Arévalo & CIA</h1>
      <p>Portal Inmobiliario de Clientes</p>
    </div>

    <div class="card">
      <div class="tab-switch">
        <button class="tab-btn active" id="tabLogin" onclick="switchTab('login')">Iniciar Sesión</button>
        <button class="tab-btn" id="tabRegistro" onclick="switchTab('registro')">Crear Cuenta</button>
      </div>

      <!-- LOGIN -->
      <div class="form-section active" id="secLogin">
        <div id="msgLogin" class="msg-box"></div>
        <div class="form-group">
          <label for="l_correo">Correo Electrónico</label>
          <input type="email" id="l_correo" placeholder="tucorreo@email.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label for="l_password">Contraseña</label>
          <div class="password-box">
            <input type="password" id="l_password" placeholder="••••••••" autocomplete="current-password">
            <button type="button" class="eye" onclick="togglePassword('l_password')">
              <img src="/public/img/eye.png" alt="Mostrar/Ocultar" onerror="this.style.display='none'">
            </button>
          </div>
        </div>
        <div style="text-align: right; margin-bottom: 20px;">
          <a href="#" onclick="olvidePassword(); return false;" style="color: #2563eb; font-size: 12px; text-decoration: none; font-weight: 600;">¿Olvidaste tu contraseña?</a>
        </div>
        <button class="btn-primary" id="btnLogin" onclick="iniciarSesion()">
          Acceder al Portal →
        </button>
      </div>

      <!-- REGISTRO -->
      <div class="form-section" id="secRegistro">
        <div id="msgReg" class="msg-box"></div>
        <div class="form-grid-2">
          <div class="form-group">
            <label for="r_nombre">Nombre(s) *</label>
            <input type="text" id="r_nombre" placeholder="Carlos">
          </div>
          <div class="form-group">
            <label for="r_ap_pat">Apellido Paterno</label>
            <input type="text" id="r_ap_pat" placeholder="Mendoza">
          </div>
        </div>
        <div class="form-grid-2">
          <div class="form-group">
            <label for="r_ap_mat">Apellido Materno</label>
            <input type="text" id="r_ap_mat" placeholder="Ruiz">
          </div>
          <div class="form-group">
            <label for="r_tel">Teléfono</label>
            <input type="tel" id="r_tel" placeholder="9611234567" maxlength="15">
          </div>
        </div>
        <div class="form-group">
          <label for="r_correo">Correo Electrónico *</label>
          <input type="email" id="r_correo" placeholder="tucorreo@email.com" onblur="validarDominio(this)">
          <div id="r_correo_tooltip" class="tooltip-error">El dominio del correo no existe o no es válido.</div>
        </div>

        <div class="form-grid-2">
          <div class="form-group">
            <label for="r_mun">Municipio</label>
            <input type="text" id="r_mun" placeholder="Tuxtla Gutiérrez">
          </div>
          <div class="form-group">
            <label for="r_estado">Estado</label>
            <input type="text" id="r_estado" placeholder="Chiapas">
          </div>
        </div>

        <div class="form-grid-2">
          <div class="form-group">
            <label for="r_curp">CURP</label>
            <input type="text" id="r_curp" placeholder="18 caracteres" maxlength="18" style="text-transform:uppercase;">
          </div>
          <div class="form-group">
            <label for="r_rfc">RFC</label>
            <input type="text" id="r_rfc" placeholder="13 caracteres" maxlength="13" style="text-transform:uppercase;">
          </div>
        </div>

        <div class="form-grid-2">
          <div class="form-group">
            <label for="r_ocup">Ocupación</label>
            <input type="text" id="r_ocup" placeholder="Ingeniero / Comerciante">
          </div>
          <div class="form-group">
            <label for="r_ingresos">Ingresos Estimados</label>
            <input type="number" id="r_ingresos" placeholder="$0.00 MXN">
          </div>
        </div>

        <div class="form-grid-2">
          <div class="form-group">
            <label for="r_sexo">Género</label>
            <select id="r_sexo">
              <option value="">Seleccionar...</option>
              <option value="Masculino">Masculino</option>
              <option value="Femenino">Femenino</option>
              <option value="Otro">Otro</option>
            </select>
          </div>
          <div class="form-group">
            <label for="r_nac">F. Nacimiento</label>
            <input type="date" id="r_nac">
          </div>
        </div>

        <div class="form-group">
          <label for="r_fuente">¿Cómo te enteraste de nosotros?</label>
          <select id="r_fuente">
            <option value="Redes Sociales">📱 Redes Sociales (Facebook / Instagram)</option>
            <option value="Recomendación">🗣️ Recomendación de un amigo</option>
            <option value="Publicidad">📢 Publicidad Impresa o Espectacular</option>
            <option value="Búsqueda Web">🌐 Búsqueda en Internet / Google</option>
          </select>
        </div>

        <div class="form-grid-2">
          <div class="form-group">
            <label for="r_pass">Contraseña *</label>
            <div class="password-box">
              <input type="password" id="r_pass" placeholder="Min. 6 caracteres">
              <button type="button" class="eye" onclick="togglePassword('r_pass')">
                <img src="/public/img/eye.png" alt="Mostrar/Ocultar" onerror="this.style.display='none'">
              </button>
            </div>
          </div>
          <div class="form-group">
            <label for="r_pass2">Confirmar *</label>
            <div class="password-box">
              <input type="password" id="r_pass2" placeholder="Repetir contraseña">
              <button type="button" class="eye" onclick="togglePassword('r_pass2')">
                <img src="/public/img/eye.png" alt="Mostrar/Ocultar" onerror="this.style.display='none'">
              </button>
            </div>
          </div>
        </div>
        <button class="btn-primary" id="btnRegistrar" onclick="crearCuenta()">
          Crear Mi Cuenta →
        </button>
      </div>
    </div>

    <div class="footer-link">
      <a href="/index.html">← Volver al Sitio Corporativo</a>
    </div>
  </div>

  <script>
    function switchTab(t) {
      document.getElementById('tabLogin').classList.remove('active');
      document.getElementById('tabRegistro').classList.remove('active');
      document.getElementById('secLogin').classList.remove('active');
      document.getElementById('secRegistro').classList.remove('active');

      if (t === 'login') {
        document.getElementById('tabLogin').classList.add('active');
        document.getElementById('secLogin').classList.add('active');
      } else {
        document.getElementById('tabRegistro').classList.add('active');
        document.getElementById('secRegistro').classList.add('active');
      }
    }

    function showMsg(id, txt, isErr=false) {
      const b = document.getElementById(id);
      b.className = 'msg-box ' + (isErr ? 'msg-error' : 'msg-success');
      b.innerText = txt;
      b.style.display = 'block';
    }

    function togglePassword(inputId) {
      const input = document.getElementById(inputId);
      if (input.type === 'password') {
        input.type = 'text';
      } else {
        input.type = 'password';
      }
    }

    async function olvidePassword() {
      if (!window.Swal) return alert('Por favor recarga la página.');

      const { value: email } = await Swal.fire({
        title: 'Recuperar Contraseña',
        input: 'email',
        inputLabel: 'Ingresa tu correo electrónico registrado',
        inputPlaceholder: 'tucorreo@email.com',
        showCancelButton: true,
        confirmButtonColor: '#2563eb',
        cancelButtonColor: '#94a3b8',
        confirmButtonText: 'Enviar enlace',
        cancelButtonText: 'Cancelar'
      });

      if (email) {
        Swal.fire({ title: 'Enviando...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });
        try {
          const res = await fetch('/api/portal/solicitar-recuperacion', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ correo: email })
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Error de red.');

          Swal.fire('¡Listo!', data.mensaje, 'success');
        } catch (err) {
          Swal.fire('Error', err.message, 'error');
        }
      }
    }

    let correoDominioValido = false;

    async function validarDominio(input) {
      const correo = input.value.trim();
      const tooltip = document.getElementById('r_correo_tooltip');
      
      if (!correo || !correo.includes('@')) {
        input.classList.remove('input-error');
        tooltip.style.display = 'none';
        correoDominioValido = false;
        return;
      }

      try {
        const res = await fetch('/api/portal/validar-dominio-correo', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ correo })
        });
        const data = await res.json();

        if (!data.valido) {
          input.classList.add('input-error');
          tooltip.innerText = data.error;
          tooltip.style.display = 'block';
          correoDominioValido = false;
        } else {
          input.classList.remove('input-error');
          tooltip.style.display = 'none';
          correoDominioValido = true;
        }
      } catch (err) {
        console.error('Error al validar dominio:', err);
      }
    }

    async function iniciarSesion() {
      const c = document.getElementById('l_correo').value.trim();
      const p = document.getElementById('l_password').value;
      const btn = document.getElementById('btnLogin');

      if (!c || !p) {
        showMsg('msgLogin', 'Por favor ingresa tu correo y contraseña.', true);
        return;
      }

      btn.disabled = true;
      btn.innerText = 'Autenticando...';

      try {
        const res = await fetch('/api/portal/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ correo: c, password: p })
        });
        const data = await res.json();

        if (!res.ok) throw new Error(data.error || 'Credenciales inválidas.');

        // Encriptar la sesión de forma avanzada con la bóveda
        const clienteCifrado = window.SecureVault ? window.SecureVault.encriptar(data.cliente) : btoa(JSON.stringify(data.cliente));
        localStorage.setItem('secure_portal_token', clienteCifrado);
        localStorage.setItem('portal_cliente', JSON.stringify(data.cliente));
        showMsg('msgLogin', '¡Bienvenido! Cargando tu portafolio patrimonial encriptado...');
        
        setTimeout(() => {
          window.location.href = '/portal-cliente.html';
        }, 1200);

      } catch (err) {
        showMsg('msgLogin', err.message, true);
        btn.disabled = false;
        btn.innerText = 'Acceder al Portal →';
      }
    }

    async function crearCuenta() {
      const n = document.getElementById('r_nombre').value.trim();
      const cor = document.getElementById('r_correo').value.trim();
      const pass = document.getElementById('r_pass').value;
      const pass2 = document.getElementById('r_pass2').value;
      const btn = document.getElementById('btnRegistrar');

      if (!n || !cor || !pass) {
        showMsg('msgReg', 'Los campos con (*) son obligatorios.', true);
        return;
      }
      if (pass !== pass2) {
        showMsg('msgReg', 'Las contraseñas no coinciden.', true);
        return;
      }
      if (pass.length < 6) {
        showMsg('msgReg', 'La contraseña debe tener mínimo 6 caracteres.', true);
        return;
      }
      if (!correoDominioValido) {
        showMsg('msgReg', 'Debes usar un correo electrónico válido y existente.', true);
        document.getElementById('r_correo').focus();
        return;
      }

      btn.disabled = true;
      btn.innerText = 'Creando expediente...';

      const payload = {
        nombre: n,
        apellido_paterno: document.getElementById('r_ap_pat').value.trim(),
        apellido_materno: document.getElementById('r_ap_mat').value.trim(),
        telefono: document.getElementById('r_tel').value.trim(),
        correo: cor,
        municipio: document.getElementById('r_mun').value.trim(),
        estado: document.getElementById('r_estado').value.trim(),
        curp: document.getElementById('r_curp').value.trim().toUpperCase(),
        rfc: document.getElementById('r_rfc').value.trim().toUpperCase(),
        ocupacion: document.getElementById('r_ocup').value.trim(),
        ingresos_mensuales: parseFloat(document.getElementById('r_ingresos').value) || 0,
        sexo: document.getElementById('r_sexo').value,
        fecha_nacimiento: document.getElementById('r_nac').value || null,
        fuente_lead: document.getElementById('r_fuente').value,
        password_cliente: pass
      };

      try {
        const res = await fetch('/api/portal/registrar', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();

        if (!res.ok) throw new Error(data.error || 'No se pudo crear la cuenta.');

        showMsg('msgReg', '¡Expediente de cliente creado y cifrado con éxito! Autenticando...');
        
        const clienteCifrado = window.SecureVault ? window.SecureVault.encriptar(data.cliente) : btoa(JSON.stringify(data.cliente));
        localStorage.setItem('secure_portal_token', clienteCifrado);
        localStorage.setItem('portal_cliente', JSON.stringify(data.cliente));
        
        setTimeout(() => {
          window.location.href = '/portal-cliente.html';
        }, 1500);

      } catch (err) {
        showMsg('msgReg', err.message, true);
        btn.disabled = false;
        btn.innerText = 'Crear Mi Cuenta →';
      }
    }

    // Auto-check sesión previa encriptada
    try {
      const token = localStorage.getItem('secure_portal_token');
      const prev = localStorage.getItem('portal_cliente');
      if (token && window.SecureVault) {
        const desc = window.SecureVault.desencriptar(token);
        if (desc && desc.id_cliente) window.location.href = '/portal-cliente.html';
      } else if (prev) {
        const u = JSON.parse(prev);
        if (u && u.id_cliente) window.location.href = '/portal-cliente.html';
      }
    } catch(e) {}

    // Habilitar la tecla 'Enter' para enviar el formulario activo
    document.addEventListener('keydown', function(event) {
      if (event.key === 'Enter') {
        const isLoginActive = document.getElementById('secLogin').classList.contains('active');
        if (isLoginActive) {
          document.getElementById('btnLogin').click();
        } else {
          document.getElementById('btnRegistrar').click();
        }
      }
    });
  </script>
</body>
</html>
