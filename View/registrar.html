<!DOCTYPE html>
<html lang="es">
<head>
  <script>
    // Escudo Anti-Intrusión: Verificación de Rol Directivo
    (function(){
      const u = localStorage.getItem('arevalo_user');
      if (!u) {
        document.documentElement.innerHTML = '';
        window.location.replace('/login.html');
        return;
      }
      try {
        const user = JSON.parse(u);
        if (!user.rol || user.rol.toLowerCase() !== 'direccion') {
          document.documentElement.innerHTML = '';
          window.location.replace('/dashboard.html');
        }
      } catch(e) {
        document.documentElement.innerHTML = '';
        window.location.replace('/login.html');
      }
    })();
  </script>

  <meta charset="UTF-8">
  <title>Registro Reservado - Arevalo & CIA</title>
  <link rel="stylesheet" href="/style/styleregister.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* ESTILOS PREMIUM PARA REGISTRO */
    body {
      background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }

    .pin-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(15, 23, 42, 0.7);
      backdrop-filter: blur(15px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .pin-card {
      background: rgba(255, 255, 255, 0.95);
      padding: 45px;
      border-radius: 32px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 30px 60px rgba(0,0,0,0.2);
      border: 1px solid rgba(255,255,255,0.5);
      animation: scaleUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .container {
      max-width: 650px;
      width: 90%;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(20px);
      border-radius: 40px;
      padding: 50px;
      box-shadow: 0 40px 100px rgba(0,0,0,0.08);
      border: 1px solid #ffffff;
      animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .top {
      text-align: center;
      margin-bottom: 40px;
    }
    .top img {
      width: 80px;
      margin-bottom: 15px;
      filter: drop-shadow(0 4px 10px rgba(0,0,0,0.1));
    }
    .top h1 {
      font-size: 32px;
      font-weight: 900;
      color: #0f172a;
      letter-spacing: -1px;
    }

    .form-box h2 {
      font-size: 16px;
      color: #64748b;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 25px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .form-box h2::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e2e8f0;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    input, select {
      width: 100%;
      padding: 16px 20px;
      border-radius: 16px;
      border: 2px solid #f1f5f9;
      background: #f8fafc;
      font-size: 15px;
      font-weight: 600;
      color: #1e293b;
      transition: 0.3s;
      outline: none;
      box-sizing: border-box;
    }

    input:focus, select:focus {
      border-color: #570fff;
      background: #ffffff;
      box-shadow: 0 0 0 4px rgba(87, 15, 255, 0.1);
    }

    .password-box {
      position: relative;
      margin-top: 20px;
    }
    .eye {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      opacity: 0.5;
      transition: 0.2s;
    }
    .eye:hover { opacity: 1; }
    .eye img { width: 22px; }

    .actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 40px;
    }

    .back {
      color: #94a3b8;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
      transition: 0.3s;
    }
    .back:hover { color: #570fff; }

    .btn {
      background: linear-gradient(135deg, #570fff 0%, #3b07ff 100%);
      color: white;
      border: none;
      padding: 18px 40px;
      border-radius: 20px;
      font-weight: 800;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(87, 15, 255, 0.3);
      transition: 0.3s;
    }
    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 35px rgba(87, 15, 255, 0.4);
    }
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    @media (max-width: 600px) {
      .row { grid-template-columns: 1fr; }
      .container { padding: 30px; border-radius: 30px; }
    }

    /* ESTILOS ESPECIFICOS PARA EL PIN */
    .pin-input {
      width: 100%;
      letter-spacing: 0.5em;
      text-align: center;
      font-size: 24px;
      font-weight: 900;
      padding: 18px;
      border-radius: 16px;
      border: 2px solid #e2e8f0;
      margin-bottom: 25px;
      outline: none;
      transition: 0.3s;
      background: #f8fafc;
    }
    .pin-input:focus {
      border-color: #570fff;
      background: #ffffff;
      box-shadow: 0 0 0 5px rgba(87, 15, 255, 0.1);
    }
    .btn-pin {
      background: linear-gradient(135deg, #0f172a 0%, #334155 100%);
      color: white;
      border: none;
      padding: 16px;
      width: 100%;
      border-radius: 16px;
      font-weight: 800;
      font-size: 15px;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }
    .btn-pin:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 30px rgba(0,0,0,0.15);
    }
    .pin-error {
      color: #ef4444;
      font-size: 13px;
      margin-top: 15px;
      font-weight: 700;
      display: none;
    }
  </style>
  <script src="/public/security-bundle.js"></script>
</head>

<body>

<!-- CAPA DE SEGURIDAD (PIN DEL DUEÑO) -->
<div class="pin-overlay" id="pinOverlay">
  <div class="pin-card">
    <img src="/public/LogoApp.png" alt="Logo" style="width: 65px; margin-bottom: 15px;">
    <h2>Acceso Restringido</h2>
    <p>Área reservada para Dirección. Ingresa el PIN maestro para dar de alta nuevos usuarios.</p>
    
    <form id="formPin">
      <input type="password" id="pinPropietario" class="pin-input" placeholder="••••••" autofocus required>
      <button type="submit" class="btn-pin" id="btnVerificarPin">Desbloquear Registro</button>
      <div class="pin-error" id="pinError">PIN incorrecto. Acceso denegado.</div>
    </form>
    
    <div style="margin-top: 25px;">
      <a href="/dashboard.html" style="color: #64748b; font-size: 13px; text-decoration: none;">← Volver al panel principal</a>
    </div>
  </div>
</div>

<main class="container" id="mainContainer" style="display: none;">

  <!-- HEADER -->
  <header class="top">
    <img src="/public/LogoApp.png" alt="Logo">
    <h1>Regístrate</h1>
  </header>

  <!-- FORM -->
  <section class="form-box">

    <h2>Datos personales</h2>

    <div id="mensaje-box" style="display: none; padding: 10px; margin-bottom: 15px; border-radius: 8px; font-weight: 500; text-align: center;"></div>

    <form id="formRegistro">

      <!-- NOMBRE -->
      <div class="row">
        <input type="text" id="nombre" placeholder="Nombre" maxlength="50" required>
        <input type="text" id="apellidos" placeholder="Apellidos" maxlength="50">
      </div>

      <!-- CORREO / TEL -->
      <div class="row">
        <input type="email" id="correo" placeholder="Correo electrónico" maxlength="100" required>
        <input type="text" id="telefono" placeholder="Teléfono (10 dígitos)" maxlength="10" minlength="10" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
      </div>

      <!-- ROL -->
      <label style="font-size: 13px; color: #64748b; margin-bottom: 8px; display: block; font-weight: 700; margin-left: 5px;">Tipo de Perfil Corporativo</label>
    
      <select id="rol" required>
        <option value="">Selecciona un rol estratégico</option>
        <option value="asesor">Asesor</option>
        <option value="administrativo">Administrativo</option>
        <option value="direccion">Dirección</option>
      </select>

      <!-- PASSWORD -->
      <div class="password-box">
        <input type="password" id="password" placeholder="Contraseña" required>
        <button type="button" class="eye">
          <img src="/public/eye.png" alt="Mostrar contraseña">
        </button>
      </div>

      <!-- BOTONES -->
      <div class="actions">
        <a href="/dashboard.html" class="back">← Volver al Panel</a>
        <button type="submit" class="btn" id="btnSubmit">Registrar</button>
      </div>

    </form>

  </section>

</main>

<script>
// Verificar PIN Maestro
const formPin = document.getElementById('formPin');
const pinError = document.getElementById('pinError');
const pinOverlay = document.getElementById('pinOverlay');
const mainContainer = document.getElementById('mainContainer');

formPin.addEventListener('submit', async (e) => {
  e.preventDefault();
  pinError.style.display = 'none';

  const pin = document.getElementById('pinPropietario').value;

  try {
    const res = await fetch('/api/registro-validar-pin', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pin })
    });

    if (!res.ok) {
      throw new Error('PIN incorrecto');
    }

    // Ocultar Overlay y mostrar formulario
    pinOverlay.style.display = 'none';
    mainContainer.style.display = 'block';

  } catch (err) {
    pinError.style.display = 'block';
  }
});

// Mostrar / ocultar contraseña
const eye = document.querySelector('.eye');
const pass = document.getElementById('password');

eye.addEventListener('click', () => {
  pass.type = pass.type === 'password' ? 'text' : 'password';
});

// Enviar Registro
const form = document.getElementById('formRegistro');
const mensajeBox = document.getElementById('mensaje-box');
const btnSubmit = document.getElementById('btnSubmit');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  
  mensajeBox.style.display = 'none';
  btnSubmit.disabled = true;
  btnSubmit.innerText = 'Registrando...';

  const nombreCompleto = document.getElementById('nombre').value.trim() + ' ' + document.getElementById('apellidos').value.trim();
  const correo = document.getElementById('correo').value.trim();
  const password = document.getElementById('password').value;
  const rol = document.getElementById('rol').value;

  try {
    const res = await fetch('/api/usuarios/registrar', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        nombre: nombreCompleto.trim(),
        correo,
        password,
        rol
      })
    });

    const data = await res.json();

    if (!res.ok) {
      throw new Error(data.error || 'Error al registrar');
    }

    // Éxito
    mensajeBox.style.background = '#d1fae5';
    mensajeBox.style.color = '#065f46';
    mensajeBox.innerText = '¡Registro exitoso! Regresando al panel...';
    mensajeBox.style.display = 'block';

    setTimeout(() => {
      window.location.href = '/dashboard.html';
    }, 2000);

  } catch (err) {
    mensajeBox.style.background = '#fee2e2';
    mensajeBox.style.color = '#991b1b';
    mensajeBox.innerText = err.message;
    mensajeBox.style.display = 'block';
    btnSubmit.disabled = false;
    btnSubmit.innerText = 'Registrar';
  }
});
</script>

</body>
</html>
