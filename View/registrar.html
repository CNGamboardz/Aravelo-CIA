<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro Reservado - Arevalo & CIA</title>
  <link rel="stylesheet" href="/style/styleregister.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* MODAL DE BLOQUEO POR PIN */
    .pin-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(12px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .pin-card {
      background: #ffffff;
      padding: 40px;
      border-radius: 20px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.3);
      animation: scaleUp 0.3s ease;
    }

    @keyframes scaleUp {
      from { transform: scale(0.95); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .pin-card h2 {
      font-size: 22px;
      color: #1e293b;
      margin-bottom: 8px;
    }

    .pin-card p {
      color: #64748b;
      font-size: 13px;
      margin-bottom: 24px;
    }

    .pin-input {
      width: 100%;
      letter-spacing: 0.5em;
      text-align: center;
      font-size: 20px;
      font-weight: 700;
      padding: 14px;
      border-radius: 12px;
      border: 2px solid #cbd5e1;
      margin-bottom: 20px;
      outline: none;
      transition: 0.2s;
    }

    .pin-input:focus {
      border-color: #570fff;
      box-shadow: 0 0 0 4px rgba(87, 15, 255, 0.15);
    }

    .btn-pin {
      background: linear-gradient(45deg, #570fff, #f97316);
      color: white;
      border: none;
      padding: 14px;
      width: 100%;
      border-radius: 12px;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn-pin:hover {
      box-shadow: 0 10px 20px rgba(87, 15, 255, 0.3);
    }

    .pin-error {
      color: #dc2626;
      font-size: 13px;
      margin-top: 12px;
      font-weight: 600;
      display: none;
    }
  </style>
</head>

<body>

<!-- CAPA DE SEGURIDAD (PIN DEL DUEÑO) -->
<div class="pin-overlay" id="pinOverlay">
  <div class="pin-card">
    <img src="/public/LogoApp.png" alt="Logo" style="width: 65px; margin-bottom: 15px;">
    <h2>Acceso Restringido</h2>
    <p>Área reservada para Dirección. Ingresa el PIN maestro para dar de alta nuevos usuarios.</p>
    
    <form id="formPin">
      <input type="password" id="pinPropietario" class="pin-input" placeholder="••••••" autofocus required>
      <button type="submit" class="btn-pin" id="btnVerificarPin">Desbloquear Registro</button>
      <div class="pin-error" id="pinError">PIN incorrecto. Acceso denegado.</div>
    </form>
    
    <div style="margin-top: 25px;">
      <a href="/login.html" style="color: #64748b; font-size: 13px; text-decoration: none;">← Volver al inicio de sesión</a>
    </div>
  </div>
</div>

<main class="container" id="mainContainer" style="display: none;">

  <!-- HEADER -->
  <header class="top">
    <img src="/public/LogoApp.png" alt="Logo">
    <h1>Regístrate</h1>
  </header>

  <!-- FORM -->
  <section class="form-box">

    <h2>Datos personales</h2>

    <div id="mensaje-box" style="display: none; padding: 10px; margin-bottom: 15px; border-radius: 8px; font-weight: 500; text-align: center;"></div>

    <form id="formRegistro">

      <!-- NOMBRE -->
      <div class="row">
        <input type="text" id="nombre" placeholder="Nombre" maxlength="50" required>
        <input type="text" id="apellidos" placeholder="Apellidos" maxlength="50">
      </div>

      <!-- CORREO / TEL -->
      <div class="row">
        <input type="email" id="correo" placeholder="Correo electrónico" maxlength="100" required>
        <input type="text" id="telefono" placeholder="Teléfono (10 dígitos)" maxlength="10" minlength="10" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
      </div>

      <!-- ROL -->
      <label style="font-size: 14px; color: #666; margin-bottom: 5px; display: block;">Tipo de usuario</label>
    
      <select id="rol" required>
        <option value="">Selecciona un rol</option>
        <option value="asesor">Asesor</option>
        <option value="administrativo">Administrativo</option>
        <option value="direccion">Dirección</option>
      </select>

      <!-- PASSWORD -->
      <div class="password-box">
        <input type="password" id="password" placeholder="Contraseña" required>
        <button type="button" class="eye">
          <img src="/public/eye.png" alt="Mostrar contraseña">
        </button>
      </div>

      <!-- BOTONES -->
      <div class="actions">
        <a href="/login.html" class="back">← Atrás</a>
        <button type="submit" class="btn" id="btnSubmit">Registrar</button>
      </div>

    </form>

  </section>

</main>

<script>
// Verificar PIN Maestro
const formPin = document.getElementById('formPin');
const pinError = document.getElementById('pinError');
const pinOverlay = document.getElementById('pinOverlay');
const mainContainer = document.getElementById('mainContainer');

formPin.addEventListener('submit', async (e) => {
  e.preventDefault();
  pinError.style.display = 'none';

  const pin = document.getElementById('pinPropietario').value;

  try {
    const res = await fetch('/api/registro-validar-pin', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pin })
    });

    if (!res.ok) {
      throw new Error('PIN incorrecto');
    }

    // Ocultar Overlay y mostrar formulario
    pinOverlay.style.display = 'none';
    mainContainer.style.display = 'block';

  } catch (err) {
    pinError.style.display = 'block';
  }
});

// Mostrar / ocultar contraseña
const eye = document.querySelector('.eye');
const pass = document.getElementById('password');

eye.addEventListener('click', () => {
  pass.type = pass.type === 'password' ? 'text' : 'password';
});

// Enviar Registro
const form = document.getElementById('formRegistro');
const mensajeBox = document.getElementById('mensaje-box');
const btnSubmit = document.getElementById('btnSubmit');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  
  mensajeBox.style.display = 'none';
  btnSubmit.disabled = true;
  btnSubmit.innerText = 'Registrando...';

  const nombreCompleto = document.getElementById('nombre').value.trim() + ' ' + document.getElementById('apellidos').value.trim();
  const correo = document.getElementById('correo').value.trim();
  const password = document.getElementById('password').value;
  const rol = document.getElementById('rol').value;

  try {
    const res = await fetch('/api/usuarios/registrar', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        nombre: nombreCompleto.trim(),
        correo,
        password,
        rol
      })
    });

    const data = await res.json();

    if (!res.ok) {
      throw new Error(data.error || 'Error al registrar');
    }

    // Éxito
    mensajeBox.style.background = '#d1fae5';
    mensajeBox.style.color = '#065f46';
    mensajeBox.innerText = '¡Registro exitoso! Redirigiendo al login...';
    mensajeBox.style.display = 'block';

    setTimeout(() => {
      window.location.href = '/login.html';
    }, 2000);

  } catch (err) {
    mensajeBox.style.background = '#fee2e2';
    mensajeBox.style.color = '#991b1b';
    mensajeBox.innerText = err.message;
    mensajeBox.style.display = 'block';
    btnSubmit.disabled = false;
    btnSubmit.innerText = 'Registrar';
  }
});
</script>

</body>
</html>
