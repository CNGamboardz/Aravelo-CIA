<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login - Arevalo & CIA</title>
  <link rel="stylesheet" href="/style/stylelogin.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<main class="layout">

  <!-- IZQUIERDA -->
  <section class="login">

    <!-- LOGO SUPERIOR -->
    <header class="login-header">
      <img src="/public/LogoApp.png" alt="Logo">
    </header>

    <article class="login-box">

      <h1>Iniciar sesión</h1>

      <form>

        <label for="email">Ingresa tu email</label>
        <input type="email" id="email" placeholder="Ingresa tu correo/usuario">

        <label for="password">Ingresa tu contraseña</label>
        <div class="password-box">
          <input type="password" id="password" placeholder="************">
          
          <button type="button" class="eye">
            <img src="/public/eye.png" alt="Mostrar contraseña">
          </button>
        </div>

        <a href="#" class="forgot"><b>¿Olvidaste tu contraseña?</b></a>

      <nav class="tabs">
        <button type="button" class="tab active" id="tabLogin">Iniciar sesión</button>
        <button type="button" class="tab" id="tabRegister">Registrarse</button>
      </nav>

      </form>

    </article>

  </section>

  <!-- DERECHA -->
  <aside class="visual">

    <img src="/public/abajoderueda.png" class="bg-diagonal">

    <div class="circle">
      <img src="/public/ruedalogin.png">
    </div>

  </aside>

</main>

<script>
// Mostrar / ocultar contraseña
const eye = document.querySelector('.eye');
const pass = document.getElementById('password');

eye.addEventListener('click', () => {
  pass.type = pass.type === 'password' ? 'text' : 'password';
});

// Tabs
const tabs = document.querySelectorAll('.tab');
const tabRegister = document.getElementById('tabRegister');
const btnRegister = document.querySelector('.btn-register');

tabs.forEach(tab => {
  tab.addEventListener('click', () => {
    tabs.forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
  });
});

// Redirección
tabRegister.addEventListener('click', () => {
  window.location.href = "/registrar.html";
});

btnRegister.addEventListener('click', () => {
  window.location.href = "/registrar.html";
});
</script>

</body>
</html>
