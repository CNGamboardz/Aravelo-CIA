<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login - Arevalo & CIA</title>
  <link rel="stylesheet" href="/style/stylelogin.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<main class="layout">

  <!-- IZQUIERDA -->
  <section class="login">

    <!-- LOGO SUPERIOR -->
    <header class="login-header">
      <img src="/public/LogoApp.png" alt="Logo">
    </header>

    <article class="login-box">

      <h1>Iniciar sesión</h1>

      <div id="mensaje-box" style="display: none; padding: 10px; margin-bottom: 15px; border-radius: 8px; font-size: 14px; text-align: center; font-weight: 500;"></div>

      <form id="formLogin">

        <label for="email">Ingresa tu email</label>
        <input type="email" id="email" placeholder="Ingresa tu correo/usuario" required>

        <label for="password">Ingresa tu contraseña</label>
        <div class="password-box">
          <input type="password" id="password" placeholder="************" required>
          
          <button type="button" class="eye">
            <img src="/public/eye.png" alt="Mostrar contraseña">
          </button>
        </div>

        <a href="#" class="forgot"><b>¿Olvidaste tu contraseña?</b></a>

        <div class="actions" style="margin-bottom: 20px;">
          <button type="submit" class="btn-login" id="btnLoginSubmit">Iniciar sesión</button>
        </div>

        <nav class="tabs" style="left: 0; display: flex; justify-content: center;">
          <button type="button" class="tab active" id="tabLogin">Iniciar sesión</button>
          <button type="button" class="tab" id="tabRegister">Registrarse</button>
        </nav>

        <!-- ACCESO EXCLUSIVO DE CLIENTES FINALES -->
        <div style="text-align: center; margin-top: 20px; border-top: 1px solid #e2e8f0; padding-top: 15px;">
          <p style="font-size: 12px; color: #64748b; margin-bottom: 8px;">¿Eres comprador o inversionista final?</p>
          <button type="button" onclick="window.location.href='/login-cliente.html'" style="background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: white; border: none; padding: 10px 20px; border-radius: 10px; font-weight: 700; font-size: 13px; cursor: pointer; box-shadow: 0 4px 12px rgba(16,185,129,0.25); transition: 0.2s; width: 100%;">
            <span>🏡</span> Acceder / Registrarse como Cliente
          </button>
        </div>

      </form>

    </article>

  </section>

  <!-- DERECHA -->
  <aside class="visual">

    <img src="/public/abajoderueda.png" class="bg-diagonal" alt="Fondo">

    <div class="circle">
      <img src="/public/ruedalogin.png" alt="Rueda Inmobiliaria">
    </div>

  </aside>

</main>

<script>
// Mostrar / ocultar contraseña
const eye = document.querySelector('.eye');
const pass = document.getElementById('password');

eye.addEventListener('click', () => {
  pass.type = pass.type === 'password' ? 'text' : 'password';
});

// Tabs redirección
const tabRegister = document.getElementById('tabRegister');
tabRegister.addEventListener('click', () => {
  window.location.href = "/registrar.html";
});

// Envío del Formulario al Backend
const form = document.getElementById('formLogin');
const mensajeBox = document.getElementById('mensaje-box');
const btnLoginSubmit = document.getElementById('btnLoginSubmit');

form.addEventListener('submit', async (e) => {
  e.preventDefault();

  mensajeBox.style.display = 'none';
  btnLoginSubmit.disabled = true;
  btnLoginSubmit.innerText = 'Verificando...';

  const correo = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  try {
    const res = await fetch('/api/usuarios/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ correo, password })
    });

    const data = await res.json();

    if (!res.ok) {
      throw new Error(data.error || 'Credenciales inválidas');
    }

    // Guardar sesión en el cliente
    localStorage.setItem('arevalo_user', JSON.stringify(data.usuario));

    mensajeBox.style.background = '#d1fae5';
    mensajeBox.style.color = '#065f46';
    mensajeBox.innerText = '¡Bienvenido! Cargando el sistema...';
    mensajeBox.style.display = 'block';

    setTimeout(() => {
      window.location.href = '/dashboard.html';
    }, 1200);

  } catch (err) {
    mensajeBox.style.background = '#fee2e2';
    mensajeBox.style.color = '#991b1b';
    mensajeBox.innerText = err.message;
    mensajeBox.style.display = 'block';
    btnLoginSubmit.disabled = false;
    btnLoginSubmit.innerText = 'Iniciar sesión';
  }
});
</script>

</body>
</html>
