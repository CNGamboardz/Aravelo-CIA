<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restablecer Contraseña — Arévalo & CIA</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="/public/security-bundle.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #0f172a;
    }
    .card {
      background: #ffffff;
      width: 100%;
      max-width: 440px;
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 20px 40px rgba(100, 116, 133, 0.08);
      text-align: center;
    }
    .logo {
      width: 64px; height: 64px;
      border-radius: 16px;
      background: #ffffff;
      border: 1px solid #bfdbfe;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
      box-shadow: 0 10px 25px rgba(37, 99, 235, 0.1);
    }
    .logo img { width: 46px; height: 46px; object-fit: contain; }
    h1 { font-size: 22px; font-weight: 800; margin-bottom: 8px; }
    p.subtitle { font-size: 14px; color: #64748b; margin-bottom: 30px; }
    
    .form-group { text-align: left; margin-bottom: 20px; }
    .form-group label {
      display: block; font-size: 11px; font-weight: 700; color: #475569;
      margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .password-box { position: relative; }
    .password-box input {
      width: 100%; padding: 14px 16px; padding-right: 44px;
      background: #f8fafc; border: 1px solid #cbd5e1; border-radius: 12px;
      font-family: 'Inter', sans-serif; font-size: 14px; color: #0f172a;
      outline: none; transition: 0.2s;
    }
    .password-box input:focus { border-color: #2563eb; background: #fff; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
    .eye {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; opacity: 0.5; transition: 0.2s;
      display: flex; align-items: center; justify-content: center; padding: 0;
    }
    .eye:hover { opacity: 1; }
    .eye img { width: 18px; height: 18px; }

    .btn-primary {
      width: 100%; padding: 16px; background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
      border: none; border-radius: 14px; color: #ffffff; font-family: 'Inter', sans-serif;
      font-size: 15px; font-weight: 700; cursor: pointer; box-shadow: 0 8px 20px rgba(37,99,235,0.2);
      transition: 0.3s;
    }
    .btn-primary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 12px 25px rgba(37,99,235,0.3); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
  </style>
</head>
<body>

  <div class="card">
    <div class="logo">
      <img src="/public/img/LogoApp.png" alt="Logo">
    </div>
    <h1>Crear Nueva Contraseña</h1>
    <p class="subtitle">Ingresa tu nueva clave de acceso para el portal.</p>

    <div class="form-group">
      <label>Nueva Contraseña</label>
      <div class="password-box">
        <input type="password" id="pass1" placeholder="Mínimo 6 caracteres">
        <button class="eye" onclick="togglePass('pass1')"><img src="/public/img/eye.png"></button>
      </div>
    </div>

    <div class="form-group">
      <label>Confirmar Contraseña</label>
      <div class="password-box">
        <input type="password" id="pass2" placeholder="Repetir contraseña">
        <button class="eye" onclick="togglePass('pass2')"><img src="/public/img/eye.png"></button>
      </div>
    </div>

    <button class="btn-primary" id="btnGuardar" onclick="guardarPassword()">Guardar Contraseña</button>
  </div>

  <script>
    function togglePass(id) {
      const el = document.getElementById(id);
      el.type = el.type === 'password' ? 'text' : 'password';
    }

    async function guardarPassword() {
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get('token');

      if (!token) {
        Swal.fire('Enlace inválido', 'No se encontró un token de seguridad válido. Solicita uno nuevo.', 'error')
        .then(() => window.location.href = '/login-cliente.html');
        return;
      }

      const pass1 = document.getElementById('pass1').value;
      const pass2 = document.getElementById('pass2').value;

      if (!pass1 || pass1.length < 6) {
        return Swal.fire('Atención', 'La contraseña debe tener mínimo 6 caracteres.', 'warning');
      }
      if (pass1 !== pass2) {
        return Swal.fire('Error', 'Las contraseñas no coinciden.', 'error');
      }

      const btn = document.getElementById('btnGuardar');
      btn.disabled = true;
      btn.innerText = 'Guardando...';

      try {
        const res = await fetch('/api/portal/restablecer-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, nuevaPassword: pass1 })
        });
        const data = await res.json();

        if (!res.ok) throw new Error(data.error || 'Error al restablecer.');

        Swal.fire('¡Éxito!', 'Tu contraseña ha sido actualizada correctamente. Ya puedes iniciar sesión.', 'success')
        .then(() => {
          window.location.href = '/login-cliente.html';
        });

      } catch (err) {
        Swal.fire('Error', err.message, 'error');
        btn.disabled = false;
        btn.innerText = 'Guardar Contraseña';
      }
    }
  </script>
</body>
</html>
